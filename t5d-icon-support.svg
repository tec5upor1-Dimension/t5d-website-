<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">T5D Support Icon</title>
<desc id="desc">A custom T5D support headset icon inside a pentagon frame.</desc>
<defs>
  <linearGradient id="steel" x1="40" y1="25" x2="180" y2="195" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#F7FAFF"/>
    <stop offset="32%" stop-color="#C7D3E0"/>
    <stop offset="62%" stop-color="#2D3743"/>
    <stop offset="100%" stop-color="#08111F"/>
  </linearGradient>
  <linearGradient id="blue" x1="50" y1="40" x2="175" y2="180" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#9FD7FF"/>
    <stop offset="45%" stop-color="#1B5CFF"/>
    <stop offset="100%" stop-color="#071B52"/>
  </linearGradient>
  <linearGradient id="ruby" x1="70" y1="45" x2="155" y2="180" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#FF6A6A"/>
    <stop offset="52%" stop-color="#E21B3C"/>
    <stop offset="100%" stop-color="#6B0B1E"/>
  </linearGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.35 0 0 0 0 1 0 0 0 0.45 0"/>
    <feMerge>
      <feMergeNode/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<rect width="220" height="220" rx="34" fill="#05070D"/>
<circle cx="110" cy="110" r="85" fill="#1B5CFF" fill-opacity="0.08"/>
<path d="M110 20L194 81L162 180H58L26 81L110 20Z" fill="#08111F" stroke="url(#steel)" stroke-width="5"/>
<path d="M110 40L171 84L148 157H72L49 84L110 40Z" fill="#0A1424" stroke="url(#blue)" stroke-width="2.5"/>

<g filter="url(#glow)">
  <path d="M70 111C70 88.9 87.9 71 110 71C132.1 71 150 88.9 150 111" stroke="#C7D3E0" stroke-width="9" stroke-linecap="round"/>
  <rect x="58" y="107" width="22" height="39" rx="10" fill="url(#blue)" stroke="#C7D3E0" stroke-width="3"/>
  <rect x="140" y="107" width="22" height="39" rx="10" fill="url(#blue)" stroke="#C7D3E0" stroke-width="3"/>
  <path d="M150 142C150 158 136 167 116 167H105" stroke="#9FD7FF" stroke-width="6" stroke-linecap="round"/>
  <circle cx="101" cy="167" r="6" fill="url(#ruby)"/>
</g>

</svg>