  <path d="M110 145V166" stroke="#C7D3E0" stroke-width="4" stroke-linecap="round"/>
  <circle cx="65" cy="73" r="5" fill="#9FD7FF"/>
  <circle cx="155" cy="73" r="5" fill="#9FD7FF"/>
  <circle cx="110" cy="166" r="5" fill="#9FD7FF"/>
