<path d="M110 40L171 84L148 157H72L49 84L110 40Z" fill="#0A1424" stroke="url(#blue)" stroke-width="2.5"/>

<g filter="url(#glow)">
  <circle cx="110" cy="110" r="35" fill="#0A1424" stroke="#C7D3E0" stroke-width="4"/>
  <circle cx="92" cy="103" r="6" fill="#9FD7FF"/>
  <circle cx="128" cy="103" r="6" fill="#9FD7FF"/>
  <circle cx="110" cy="129" r="6" fill="url(#ruby)"/>
